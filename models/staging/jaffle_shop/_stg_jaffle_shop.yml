models:
  - name: stg_jaffle_shop__orders
    description: one unique customer per row
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: status                    #column names
        description: "{{ doc('order_status') }}"
        tests:
          - accepted_values:
              arguments:
                values:
                  - completed
                  - shipped
                  - returned
                  - placed
                  - return_pending
      - name: customer_id
        tests:
          - relationships:
              arguments:
                field: customer_id
                to: ref('stg_jaffle_shop__customer')